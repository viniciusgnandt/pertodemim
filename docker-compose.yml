version: '3.8'

services:
  mongo1:
    image: mongo:7.0
    container_name: pertodemim_mongo1
    hostname: mongo1
    restart: unless-stopped
    ports:
      - "27000:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    volumes:
      - mongo1_data:/data/db
      - ./mongo-init/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/etc/mongo-keyfile"]
    entrypoint:
      - bash
      - -c
      - |
        openssl rand -base64 756 > /etc/mongo-keyfile
        chmod 400 /etc/mongo-keyfile
        chown 999:999 /etc/mongo-keyfile
        exec docker-entrypoint.sh $$@
    networks:
      - pertodemim_net

  mongo-init:
    image: mongo:7.0
    container_name: pertodemim_mongo_init
    depends_on:
      - mongo1
    restart: "no"
    networks:
      - pertodemim_net
    command: >
      bash -c "
        sleep 10 &&
        mongosh --host mongo1:27017 -u admin -p adminpassword --authenticationDatabase admin --eval '
          try {
            rs.status();
            print(\"Replica set already initialized\");
          } catch(e) {
            rs.initiate({
              _id: \"rs0\",
              members: [{ _id: 0, host: \"mongo1:27017\" }]
            });
            print(\"Replica set initialized\");
          }
        '
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pertodemim_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      - mongo-init
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGODB_URI=mongodb://admin:adminpassword@mongo1:27017/pertodemim?authSource=admin&replicaSet=rs0
      - JWT_SECRET=your_super_secret_jwt_key_change_in_production
      - JWT_REFRESH_SECRET=your_super_secret_refresh_key_change_in_production
      - FRONTEND_URL=http://localhost:5173
    networks:
      - pertodemim_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pertodemim_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pertodemim_net

volumes:
  mongo1_data:

networks:
  pertodemim_net:
    driver: bridge
